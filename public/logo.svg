<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer silver ring -->
  <circle cx="100" cy="100" r="100" fill="url(#silver)"/>
  <!-- Black inner circle -->
  <circle cx="100" cy="100" r="80" fill="#0a0a0a"/>
  <!-- White inner ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="white" stroke-width="4"/>
  <!-- VEDIC text -->
  <text x="100" y="113" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle" letter-spacing="2">VEDIC</text>
  <defs>
    <radialGradient id="silver" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="40%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>
  </defs>
</svg>
